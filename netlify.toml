# Next.js 15 on Netlify — use the official adapter (OpenNext).
# In Netlify UI: leave “Publish directory” empty unless you know you need a custom value;
# the plugin sets the correct output.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
