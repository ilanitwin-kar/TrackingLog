# Next.js on Netlify — @netlify/plugin-nextjs (OpenNext).
# Publish must NOT be the repo root (Netlify default). Use `.next` after `next build`.
# אם מגדירים גם ב-UI: אותו ערך — `.next` (לא שורש ולא ריק).

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
